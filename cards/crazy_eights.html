<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crazy Eights</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="game-wrapper">
    <div class="top-bar">
      <h1>8️⃣ Crazy Eights</h1>
      <div id="crazy-eights-scoreboard" class="scoreboard">You: 0 | Bot1: 0 | Bot2: 0</div>
    </div>
    <div class="table">
      <div class="bot-area">
        <h2>Bots</h2>
        <div class="hand" id="bot1-hand"></div>
        <div class="hand" id="bot2-hand"></div>
      </div>
      <div class="center-area">
        <div class="discard-pile" id="discard-pile"></div>
        <div class="draw-pile" id="draw-pile"></div>
        <div class="log" id="log"></div>
      </div>
      <div class="player-area">
        <h2>You</h2>
        <div class="hand" id="player-hand"></div>
      </div>
    </div>
    <div class="controls">
      <button onclick="crazyEightsAction('restart')">Restart</button>
    </div>
    <a href="../index.html" class="back-button">Back</a>
  </div>
  <script src="crazy_eights.js"></script>
</body>
</html>
