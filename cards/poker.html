<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="game-wrapper">
    <div class="top-bar">
      <h1>♠️ Poker (Texas Hold'em)</h1>
      <div id="poker-scoreboard" class="scoreboard">Player: 0 | Bot: 0</div>
    </div>
    <div class="table">
      <div class="bot-area">
        <h2>Bot</h2>
        <div class="hand" id="bot-hand"></div>
      </div>
      <div class="center-area">
        <div class="community-cards" id="community-cards"></div>
        <div class="pot" id="pot">Pot: $0</div>
        <div class="log" id="log"></div>
      </div>
      <div class="player-area">
        <h2>You</h2>
        <div class="hand" id="player-hand"></div>
        <div class="controls">
          <button onclick="pokerAction('check')">Check</button>
          <button onclick="pokerAction('bet')">Bet</button>
          <button onclick="pokerAction('fold')">Fold</button>
        </div>
      </div>
    </div>
    <a href="../index.html" class="back-button">Back</a>
  </div>
  <script src="poker.js"></script>
</body>
</html>
