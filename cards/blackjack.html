<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="game-wrapper">
    <div class="top-bar">
      <h1>🂡 Blackjack</h1>
      <div id="blackjack-scoreboard" class="scoreboard">Player: 0 | Dealer: 0</div>
    </div>
    <div class="table">
      <div class="bot-area">
        <h2>Dealer</h2>
        <div class="hand" id="dealer-hand"></div>
      </div>
      <div class="center-area">
        <div class="log" id="log"></div>
      </div>
      <div class="player-area">
        <h2>You</h2>
        <div class="hand" id="player-hand"></div>
        <div class="controls">
          <button onclick="blackjackAction('hit')">Hit</button>
          <button onclick="blackjackAction('stand')">Stand</button>
          <button onclick="blackjackAction('restart')">Restart</button>
        </div>
      </div>
    </div>
    <a href="../index.html" class="back-button">Back</a>
  </div>
  <script src="blackjack.js"></script>
</body>
</html>
