<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Tactics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="tictactoe.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer">
            <h1 class="neon-title">TACTICAL_TOE</h1>
            
            <div id="score-board">
                <div class="score p1">
                    <div class="label">PLAYER</div>
                    <div class="val" id="score-1">0</div>
                </div>
                <div class="score p2">
                    <div class="label">CPU</div>
                    <div class="val" id="score-2">0</div>
                </div>
            </div>
            
            <div id="controls">
                <div class="difficulty-selector">
                    <span>DIFF:</span>
                    <button class="diff-btn active" data-lvl="0">EASY</button>
                    <button class="diff-btn" data-lvl="1">MED</button>
                    <button class="diff-btn" data-lvl="2">HARD</button>
                </div>
                <div class="status" id="status-msg">WAITING FOR INPUT...</div>
                <button id="reset-btn" class="neon-btn">RESET SIMULATION</button>
            </div>
        </div>
    </div>

    <script src="../../ui.js"></script>
    <script src="tictactoe.js"></script>
</body>
</html>
