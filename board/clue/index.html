<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Clue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="clue.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="800"></canvas>
        <div id="ui-overlay">
            <div id="notebook-panel">
                <h3>Notebook</h3>
                <!-- Checklist generated by JS -->
                <div id="notebook-content"></div>
            </div>
            <div id="action-panel">
                <button id="roll-btn" class="action-btn">ROLL DICE</button>
                <button id="accuse-btn" class="action-btn hidden">ACCUSE</button>
                <button id="end-turn-btn" class="action-btn hidden">END TURN</button>
            </div>
        </div>
    </div>
    
    <!-- GameUI Script -->
    <script src="../../ui.js"></script>
    <script src="clue.js"></script>
</body>
</html>
