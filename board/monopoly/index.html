<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Estate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="monopoly.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="score-panel">
                <div class="player-card p1 active">
                    <div class="p-name">YOU</div>
                    <div class="p-money">$1500</div>
                    <div class="p-props">Props: 0</div>
                </div>
                <div class="player-card p2">
                    <div class="p-name">CPU 1</div>
                    <div class="p-money">$1500</div>
                    <div class="p-props">Props: 0</div>
                </div>
                <div class="player-card p3">
                    <div class="p-name">CPU 2</div>
                    <div class="p-money">$1500</div>
                    <div class="p-props">Props: 0</div>
                </div>
                <div class="player-card p4">
                    <div class="p-name">CPU 3</div>
                    <div class="p-money">$1500</div>
                    <div class="p-props">Props: 0</div>
                </div>
            </div>
            
            <div id="center-message">NEON ESTATE</div>
            
            <div id="action-panel">
                <button id="btn-roll" class="neon-btn">ROLL DICE</button>
                <button id="btn-buy" class="neon-btn" disabled>BUY PROPERTY</button>
                <button id="btn-end" class="neon-btn" disabled>END TURN</button>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>

    <script src="../../ui.js"></script>
    <script src="monopoly.js"></script>
</body>
</html>
