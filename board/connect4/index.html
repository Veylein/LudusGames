<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Four - Ludus Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="connect4.css">
</head>
<body class="theme-classic">

    <div class="game-container">
        <header>
            <a href="../index.html" class="back-link">← Back to Board Games</a>
            <h1 class="glow-title" data-text="CONNECT FOUR">CONNECT FOUR</h1>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
                <em>Enable Dark Mode!</em>
            </div>
        </header>

        <main>
            <div class="game-layout">
                <div class="status-bar" id="status">Player Start (Red)</div>

                <div class="board-wrapper">
                    <!-- The "lid" or front of the board with holes -->
                    <div class="board-front"></div>
                    
                    <!-- The actual slots where chips go (behind the front) -->
                    <div class="board-grid" id="board-grid">
                        <!-- Generated by JS: 7 cols x 6 rows -->
                    </div>
                    
                    <!-- Click targets for columns -->
                    <div class="column-click-layer" id="click-layer">
                        <div class="col-trigger" data-col="0"></div>
                        <div class="col-trigger" data-col="1"></div>
                        <div class="col-trigger" data-col="2"></div>
                        <div class="col-trigger" data-col="3"></div>
                        <div class="col-trigger" data-col="4"></div>
                        <div class="col-trigger" data-col="5"></div>
                        <div class="col-trigger" data-col="6"></div>
                    </div>
                </div>

                <div class="controls">
                    <div class="difficulty-control">
                        <span>Difficulty: </span>
                        <select id="difficulty-select">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                    
                    <button id="reset-btn" class="retro-btn">Reset Game</button>
                    
                    <div class="score-display">
                        <div class="score-box p1">
                            <div class="chip-icon red"></div>
                            <span>YOU</span>
                            <b id="score-p1">0</b>
                        </div>
                        <div class="score-box p2">
                            <div class="chip-icon yellow"></div>
                            <span>BOT</span>
                            <b id="score-p2">0</b>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">VICTORY!</h2>
            <p id="modal-msg">You connected four!</p>
            <button id="modal-restart">Play Again</button>
        </div>
    </div>

    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <script src="connect4.js"></script>
</body>
</html>
