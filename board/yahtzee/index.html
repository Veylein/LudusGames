<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RNG Protocol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="yahtzee.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-layer">
            <h1 class="neon-title">RNG_PROTOCOL</h1>
            
            <div id="dice-area">
                <!-- Overlay markers for dice if needed, or just canvas handled -->
            </div>
            
            <div id="controls">
                <div id="roll-info">ROLLS LEFT: <span id="rolls-left">3</span></div>
                <button id="roll-btn" class="neon-btn">EXECUTE ROLL</button>
            </div>
            
            <div id="score-card">
                <div class="score-row header">
                    <span>CATEGORY</span>
                    <span>SCORE</span>
                </div>
                <div id="score-entries"></div>
                <div class="score-row total">
                    <span>TOTAL</span>
                    <span id="grand-total">0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="../../ui.js"></script>
    <script src="yahtzee.js"></script>
</body>
</html>
