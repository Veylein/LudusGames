<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Crossword</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1 class="neon-title">CYBER_CROSSWORD v.1.0</h1>
        
        <div class="crossword-layout">
            <div id="crossword-grid" class="grid-container"></div>
            
            <div class="clue-panel">
                <div class="clues-section">
                    <h3>ACROSS</h3>
                    <ul id="clues-across" class="clue-list"></ul>
                </div>
                <div class="clues-section">
                    <h3>DOWN</h3>
                    <ul id="clues-down" class="clue-list"></ul>
                </div>
            </div>
        </div>
        
        <div class="controls-panel">
            <div id="current-clue-display">SELECT A WORD</div>
            <div class="buttons">
                <button id="check-btn" class="cyber-btn">CHECK INTEGRITY</button>
                <button id="reveal-btn" class="cyber-btn warning">DECRYPT WORD</button>
                <button id="new-game-btn" class="cyber-btn">REBOOT SYSTEM</button>
            </div>
        </div>
    </div>

    <!-- GameUI Script -->
    <script src="../../ui.js"></script>
    <script src="crossword.js"></script>
</body>
</html>
