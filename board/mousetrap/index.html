<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Trap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="mousetrap.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-overlay">
            <h1 class="neon-title">CYBER_TRAP.exe</h1>
            
            <div id="player-panels">
                <div class="p-panel p0 active">
                    <div class="p-name">SYS_ADMIN</div>
                    <div class="p-data">DATA: 0</div>
                    <div class="p-trap">TRAP: [ ] [ ] [ ]</div>
                </div>
                <div class="p-panel p1">
                    <div class="p-name">GUEST_USER</div>
                    <div class="p-data">DATA: 0</div>
                    <div class="p-trap">TRAP: [ ] [ ] [ ]</div>
                </div>
                <div class="p-panel p2">
                    <div class="p-name">BOT_01</div>
                    <div class="p-data">DATA: 0</div>
                    <div class="p-trap">TRAP: [ ] [ ] [ ]</div>
                </div>
                <div class="p-panel p3">
                    <div class="p-name">BOT_02</div>
                    <div class="p-data">DATA: 0</div>
                    <div class="p-trap">TRAP: [ ] [ ] [ ]</div>
                </div>
            </div>
            
            <div id="game-controls">
                <div id="dice-display">READY</div>
                <div class="btn-group">
                    <button id="btn-roll" class="cyber-btn">EXECUTE ROLL</button>
                    <button id="btn-trap" class="cyber-btn" disabled>ACTIVATE TRAP</button>
                </div>
                <div id="status-log">INITIALIZING...</div>
            </div>
        </div>
    </div>

    <script src="../../ui.js"></script>
    <script src="mousetrap.js"></script>
</body>
</html>
