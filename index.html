<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="themes.css">
</head>

<body class="theme-dark">

<div id="emoji-container"></div>

<header class="nav">
    <div class="logo">LUDUS</div>

    <div class="controls">

        <div class="theme-dropdown">
            <button id="themeBtn">Theme</button>
            <div class="theme-menu">
                <button data-theme="theme-dark">Dark</button>
                <button data-theme="theme-light">Light</button>
                <button data-theme="theme-holo">Holographic</button>
                <button data-theme="theme-rainbow">Rainbow</button>
            </div>
        </div>

        <label class="switch">
            <input type="checkbox" id="emojiToggle">
            <span class="slider"></span>
        </label>

    </div>
</header>

<main class="hero">

    <h1 class="glow-title">LUDUS</h1>
    <p class="subtitle">Where games glow brighter than the city.</p>

    <div class="section-grid">

        <a href="cards/index.html" class="section-card">
            <div class="card-title">Cards</div>
        </a>

        <a href="#" class="section-card disabled">
            <div class="card-title">Board Games</div>
        </a>

        <a href="#" class="section-card disabled">
            <div class="card-title">Connections</div>
        </a>

    </div>

</main>

<script src="ui.js"></script>
<script src="effects.js"></script>

</body>
</html>
