<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="themes.css">
</head>
<body class="theme-dark">

<div class="background-flicker"></div>

<div class="hub">

    <h1 class="glow-title">LUDUS</h1>
    <p class="subtitle">Where games live.</p>

    <div class="section-grid">

        <a href="cards/index.html" class="section-card">
            🎴 Cards
        </a>

        <a href="board/index.html" class="section-card">
            ♟️ Board Games
        </a>

        <a href="connections/index.html" class="section-card">
            🌐 Connections
        </a>

    </div>

</div>

<div class="control-panel">

    <select id="themeSelect">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="holographic">Holographic</option>
        <option value="rainbow">Rainbow</option>
    </select>

    <label class="switch">
        <input type="checkbox" id="emojiToggle">
        <span class="slider"></span>
    </label>
    <span class="toggle-label">Emoji Rain</span>

</div>

<script src="ui.js"></script>
<script src="effects.js"></script>
</body>
</html>
