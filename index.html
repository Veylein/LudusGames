<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="themes.css">
</head>

<body class="theme-classic">

<div id="emoji-container"></div>

<header class="nav">
    <div class="logo">LUDUS</div>

    <div class="controls">

        <div class="score-display">
            PTS: <span class="points-display">0</span>
        </div>

        <div class="difficulty-control">
            <select id="difficultySelect">
                <option value="0">Apprentice</option>
                <option value="1">Gambler</option>
                <option value="2">Ruthless</option>
            </select>
        </div>

        <div class="font-dropdown">
            <button id="fontBtn">Font</button>
            <div class="font-menu">
                <button data-font="retro">Retro</button>
                <button data-font="cozy">Cozy</button>
                <button data-font="poker">Poker</button>
                <button data-font="classic">Classic</button>
                <button data-font="discord">Discord</button>
            </div>
        </div>

                <div class="style-dropdown">
            <button id="styleBtn">Style</button>
            <div class="style-menu">
                <button data-style="style-classic">Classic</button>
                <button data-style="style-relaxation">Relaxation</button>
                <button data-style="style-arcade">Arcade</button>
                <button data-style="style-casino">Casino</button>
                <button data-style="style-yacht">Yacht</button>
            </div>
        </div>

        <div class="theme-dropdown">
<button id="themeBtn">Theme</button>
            <div class="theme-menu">
                <button data-theme="theme-dark">Dark</button>
                <button data-theme="theme-light">Light</button>
                <button data-theme="theme-holo">Holographic</button>
                <button data-theme="theme-rainbow">Rainbow</button>
                <button data-theme="theme-opal-fire">Opal Fire</button>
            </div>
        </div>
        </div>

        <label class="switch">
            <input type="checkbox" id="emojiToggle">
            <span class="slider"></span>
        </label>

    </div>
</header>

<main class="hero">

    <h1 class="glow-title">LUDUS</h1>
    <p class="subtitle">Where games glow brighter than the city.</p>

    <!-- MAIN HUB NAVIGATION -->
    <div class="map-container">
        <!-- Background Image -->
        <img src="https://media.discordapp.net/attachments/1441089574255460363/1475994705530720400/content.png?ex=699f82b0&is=699e3130&hm=2b05f96948b2729e192af8f903c8ebcef6496827150c53ee164d8b46f05c6142&=&format=webp&quality=lossless&width=1223&height=815" alt="Ludus Lobby Map" class="map-image">

        <!-- Casino Doorway (Cards) -->
        <a href="cards/index.html" class="map-zone" style="left: 24.7%; top: 17.6%; width: 24.7%; height: 56.6%;" title="Enter Casino (Card Games)">
            <div class="zone-hover">
                <span class="zone-label">CASINO</span>
                <span class="zone-sub">Card Games</span>
            </div>
        </a>

        <!-- D&D Room (Board Games) -->
        <a href="board/index.html" class="map-zone" style="left: 50.1%; top: 21.5%; width: 11.1%; height: 52.7%;" title="Enter D&D Room (Board Games)">
            <div class="zone-hover">
                <span class="zone-label">BOARD</span>
                <span class="zone-sub">Tabletop</span>
            </div>
        </a>

        <!-- Arcade Doorway -->
        <a href="arcade/index.html" class="map-zone" style="left: 62.5%; top: 20.5%; width: 11.1%; height: 53.7%;" title="Enter Arcade">
            <div class="zone-hover">
                <span class="zone-label">ARCADE</span>
                <span class="zone-sub">Minigames</span>
            </div>
        </a>

        <!-- Partnerships / Connections -->
        <a href="connections/index.html" class="map-zone" style="left: 74.9%; top: 20.5%; width: 22.1%; height: 57.6%;" title="Enter Connections">
            <div class="zone-hover">
                <span class="zone-label">OFFICE</span>
                <span class="zone-sub">Connections</span>
            </div>
        </a>
    </div>

</main>

<script src="ui.js"></script>
<script src="effects.js"></script>

</body>
</html>
