<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="themes.css">
</head>

<body class="theme-classic lobby-page">

<div id="emoji-container"></div>

<!-- LOBBY OVERLAY WRAPPER -->
<!-- This preserves the aspect ratio of the background image so buttons align perfectly -->
<div class="lobby-wrapper">
    <!-- Clickable Zones (Absolute positioned % based on the 100% width/height of wrapper) -->
    
    <!-- Casino Doorway (Cards) -->
    <!-- Moved left (~13%), Made Thinner (~16%), Shorter (~45%) -->
    <a href="cards/index.html" class="map-zone" style="left: 13.5%; top: 22.0%; width: 16.0%; height: 45.0%;" title="Enter Casino (Card Games)">
        <div class="zone-hover">
            <span class="zone-label">CASINO</span>
            <span class="zone-sub">Card Games</span>
        </div>
    </a>

    <!-- D&D Room (Board Games) -->
    <!-- Moved slightly right (~2%) -->
    <a href="board/index.html" class="map-zone" style="left: 35.5%; top: 22.0%; width: 13.0%; height: 48.0%;" title="Enter D&D Room (Board Games)">
        <div class="zone-hover">
            <span class="zone-label">BOARD</span>
            <span class="zone-sub">Tabletop</span>
        </div>
    </a>

    <!-- Arcade Doorway -->
    <!-- Slightly slanted (clip-path), slightly smaller -->
    <a href="arcade/index.html" class="map-zone" style="left: 53.0%; top: 23.0%; width: 10.5%; height: 48.0%; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);" title="Enter Arcade">
        <div class="zone-hover" style="transform: skew(-2deg);">
            <span class="zone-label">ARCADE</span>
            <span class="zone-sub">Minigames</span>
        </div>
    </a>

    <!-- Partnerships / Connections -->
    <!-- Top/Bottom close in on center (Trapezoid shape via clip-path) -->
    <a href="connections/index.html" class="map-zone" style="left: 67.0%; top: 22.0%; width: 22.0%; height: 50.0%; clip-path: polygon(5% 10%, 95% 10%, 85% 90%, 15% 90%);" title="Enter Connections">
        <div class="zone-hover">
            <span class="zone-label">OFFICE</span>
            <span class="zone-sub">Connections</span>
        </div>
    </a>
</div>

<header class="nav home-nav">
    <div class="logo">LUDUS</div>

    <div class="controls">

        <div class="score-display">
            PTS: <span class="points-display">0</span>
        </div>

        <div class="difficulty-control">
            <select id="difficultySelect">
                <option value="0">Apprentice</option>
                <option value="1">Gambler</option>
                <option value="2">Ruthless</option>
            </select>
        </div>

        <div class="font-dropdown">
            <button id="fontBtn">Font</button>
            <div class="font-menu">
                <button data-font="retro">Retro</button>
                <button data-font="cozy">Cozy</button>
                <button data-font="poker">Poker</button>
                <button data-font="classic">Classic</button>
                <button data-font="discord">Discord</button>
            </div>
        </div>

                <div class="style-dropdown">
            <button id="styleBtn">Style</button>
            <div class="style-menu">
                <button data-style="style-classic">Classic</button>
                <button data-style="style-relaxation">Relaxation</button>
                <button data-style="style-arcade">Arcade</button>
                <button data-style="style-casino">Casino</button>
                <button data-style="style-yacht">Yacht</button>
            </div>
        </div>

        <div class="theme-dropdown">
<button id="themeBtn">Theme</button>
            <div class="theme-menu">
                <button data-theme="theme-dark">Dark</button>
                <button data-theme="theme-light">Light</button>
                <button data-theme="theme-holo">Holographic</button>
                <button data-theme="theme-rainbow">Rainbow</button>
                <button data-theme="theme-opal-fire">Opal Fire</button>
            </div>
        </div>
        </div>

        <label class="switch">
            <input type="checkbox" id="emojiToggle">
            <span class="slider"></span>
        </label>

    </div>
</header>

<div class="lobby-title">
    <h1 class="glow-title">LUDUS</h1>
    <p class="subtitle">Where games glow brighter than the city.</p>
</div>

<!-- REMOVED OLD MAP CONTAINER, CONTENT MOVED TO LOBBY-WRAPPER ABOVE -->
<main class="hero" style="display:none;"></main>


<script src="ui.js"></script>
<script src="effects.js"></script>

</body>
</html>
