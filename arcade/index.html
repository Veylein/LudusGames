<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludus - Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../themes.css">
    <link rel="stylesheet" href="arcade.css">
</head>

<body class="theme-classic arcade-lobby-page">

<div id="emoji-container"></div>

<!-- ARCADE LOBBY WRAPPER -->
<div class="lobby-wrapper arcade-wrapper" id="arcade-lobby">
    <!-- Links will be generated by JS -->
    <div class="loading-indicator" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: 'Press Start 2P'; font-size: 24px;">LOADING GAMES...</div>
</div>

<header class="nav">
    <div class="logo"><a href="../index.html" style="text-decoration: none; color: inherit;">LUDUS</a></div>

    <div class="controls">

        <div class="score-display">
            PTS: <span class="points-display">0</span>
        </div>

        <div class="difficulty-control">
            <select id="difficultySelect">
                <option value="0">Apprentice</option>
                <option value="1">Gambler</option>
                <option value="2">Ruthless</option>
            </select>
        </div>

        <div class="font-dropdown">
            <button id="fontBtn">Font</button>
            <div class="font-menu">
                <button data-font="retro">Retro</button>
                <button data-font="cozy">Cozy</button>
                <button data-font="poker">Poker</button>
                <button data-font="classic">Classic</button>
                <button data-font="discord">Discord</button>
            </div>
        </div>

                <div class="style-dropdown">
            <button id="styleBtn">Style</button>
            <div class="style-menu">
                <button data-style="style-classic">Classic</button>
                <button data-style="style-relaxation">Relaxation</button>
                <button data-style="style-arcade">Arcade</button>
                <button data-style="style-casino">Casino</button>
                <button data-style="style-yacht">Yacht</button>
            </div>
        </div>

        <div class="theme-dropdown">
<button id="themeBtn">Theme</button>
            <div class="theme-menu">
                <button data-theme="theme-dark">Dark</button>
                <button data-theme="theme-light">Light</button>
                <button data-theme="theme-holo">Holographic</button>
                <button data-theme="theme-rainbow">Rainbow</button>
                <button data-theme="theme-opal-fire">Opal Fire</button>
            </div>
        </div>
        </div>

        <label class="switch">
            <input type="checkbox" id="emojiToggle">
            <span class="slider"></span>
        </label>

    </div>
</header>

<main class="hero">

    <h1 class="glow-title" data-text="ARCADE">ARCADE</h1>
    <p class="subtitle"><a href="../index.html" style="color: var(--primary); text-decoration: none;">&lt; Back to Home</a></p>

        <div class="section-grid">
            <div class="section-card-list danger-border">
                <div class="card-games-grid">
                    <a href="snake/index.html" class="game-link"><span>Snake</span></a>
                    <a href="dino/index.html" class="game-link"><span>Dino Run</span></a>
                    <a href="flappy/index.html" class="game-link"><span>Flappy Bird</span></a>
                    <a href="pacman/index.html" class="game-link"><span>Pacman</span></a>
                    <a href="invaders/index.html" class="game-link"><span>Space Invaders</span></a>
                    <a href="kong/index.html" class="game-link"><span>Donkey Kong</span></a>
                    <a href="centipede/index.html" class="game-link"><span>Centipede</span></a>
                    <a href="frogger/index.html" class="game-link"><span>Frogger</span></a>
                    <a href="galaga/index.html" class="game-link"><span>Galaga</span></a>
                    <a href="tetris/index.html" class="game-link"><span>Tetris</span></a>
                    <a href="pong/index.html" class="game-link"><span>Pong</span></a>
                    <a href="breakout/index.html" class="game-link"><span>Breakout</span></a>
                    <a href="asteroids/index.html" class="game-link"><span>Asteroids</span></a>
                    <a href="qbert/index.html" class="game-link"><span>Q*bert</span></a>
                    <a href="Weekly/index.html" class="game-link"><span>Dungeon Crawler</span></a>
                </div>
        </div>

</main>

<script src="../ui.js"></script>
<script src="../effects.js"></script>
<script>
    // Dynamic Game Loader
    fetch('games.json')
        .then(response => {
            if (!response.ok) throw new Error("Failed to load game data");
            return response.json();
        })
        .then(games => {
            const container = document.getElementById('arcade-lobby');
            if (!container) return;
            
            // Clear existing content (loading text) if any
            container.innerHTML = ''; 
            
            games.forEach(game => {
                const a = document.createElement('a');
                a.href = game.url;
                a.className = 'map-zone';
                // Animation delay for cool entrance
                a.style.opacity = '0';
                a.style.animation = 'fadeIn 0.5s forwards';
                a.style.animationDelay = Math.random() * 0.5 + 's';
                
                // Use percentages for responsiveness
                a.style.left = game.x + '%';
                a.style.top = game.y + '%';
                a.style.width = '12.5%';
                a.style.height = '40%';
                a.title = game.name;
                
                const hover = document.createElement('div');
                hover.className = 'zone-hover';
                
                const label = document.createElement('span');
                label.className = 'zone-label';
                label.innerText = game.id === 'weekly' ? 'CRAWLER' : game.name.toUpperCase(); // Custom label for Weekly
                
                // Optional: color from JSON
                if(game.color) hover.style.borderColor = game.color;
                if(game.color) label.style.color = game.color;
                
                hover.appendChild(label);
                a.appendChild(hover);
                container.appendChild(a);
            });
        })
        .catch(err => {
            console.error(err);
            const c = document.getElementById('arcade-lobby');
            if(c) c.innerHTML = '<div style="color:red; text-align:center; margin-top:20%;">SYSTEM ERROR: GAMES NOT FOUND</div>';
        });
</script>
</body>
</html>
