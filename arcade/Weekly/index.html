<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remembrance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="debug-info">
            <h1>Remembrance</h1>
            <p>Mode: <span id="mode-display">Survival</span></p>
            <p>Time: <span id="time-display">Year 1</span></p>
            <div id="interaction-log"></div>
        </div>
        <div id="inspector" style="display:none;">
            <h3>Entity Inspector</h3>
            <pre id="inspector-content"></pre>
        </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <script type="module" src="game.js"></script>
</body>
</html>
