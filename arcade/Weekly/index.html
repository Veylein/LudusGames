<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler</title>
    <link rel="stylesheet" href="style.css">
    <!-- Import Three.js and addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <!-- UI Overlay -->
    <div id="ui-layer">
        <div id="hud-top" style="display: none;">
            <div id="score">SCORE: 0</div>
            <div id="health-container">
                <div id="health-bar"></div>
            </div>
            <div id="ability-cd">ABILITY: READY</div>
        </div>
        
        <div id="character-select">
            <h1>CHAMPION SELECT</h1>
            <p>Choose your Legend</p>
            <div id="class-grid">
                <!-- Populated by JS -->
            </div>
            <button id="start-btn" disabled>ENTER ARENA</button>
        </div>

        <div id="game-over-screen" style="display: none;">
            <h1>DEFEAT</h1>
            <button id="restart-btn">RESPAWN</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
