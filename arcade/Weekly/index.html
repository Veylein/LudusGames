<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler</title>
    <link rel="stylesheet" href="style.css">
    <!-- Import Three.js and addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <!-- UI Overlay -->
    <div id="ui-layer">
        
        <!-- Instructions Overlay -->
        <div id="instructions" style="position: absolute; top: 10px; right: 10px; text-align: right; color: #fff; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none;">
            <h3>CONTROLS</h3>
            <p><b>WASD</b> - Move</p>
            <p><b>CLICK</b> or <b>SPACE</b> - Attack</p>
            <p><b>1, 2, 3, 4</b> - Abilities</p>
        </div>

        <div id="hud-top" style="display: none;">
            <div id="score">SCORE: 0</div>
            <div id="health-container">
                <div id="health-bar"></div>
            </div>
            <!-- Hotbar inside HUD Top logic or separate? Putting below for layout -->
        </div>

        <!-- Hotbar (Also hidden initially) -->
        <div id="hotbar-container" style="display: none;">
            <!-- Slots 1-4 -->
            <div class="hotbar-slot" id="slot-1" data-key="1">
                <span class="key-hint">1</span>
                <span class="icon" id="icon-1">⚔️</span>
            </div>
            <div class="hotbar-slot" id="slot-2" data-key="2">
                <span class="key-hint">2</span>
                <span class="icon" id="icon-2">✨</span>
            </div>
            <div class="hotbar-slot" id="slot-3" data-key="3">
                <span class="key-hint">3</span>
                <span class="icon" id="icon-3">🛡️</span>
            </div>
            <div class="hotbar-slot" id="slot-4" data-key="4">
                <span class="key-hint">4</span>
                <span class="icon" id="icon-4">⚡</span>
            </div>
        </div>

        <!-- On-Screen Controls (Visible on start) -->
        <div id="mobile-controls">
            <div class="control-group dpad-grid">
                <div class="control-btn" id="btn-w">W</div>
                <div class="control-btn" id="btn-a">A</div>
                <div class="control-btn" id="btn-s">S</div>
                <div class="control-btn" id="btn-d">D</div>
            </div>
            <div class="control-group action-grid">
                <div class="control-btn" id="btn-1">1</div>
                <div class="control-btn" id="btn-2">2</div>
                <div class="control-btn" id="btn-3">3</div>
                <div class="control-btn" id="btn-4">4</div>
                <div class="control-btn big-btn" id="btn-attack">⚔️</div>
            </div>
        </div>
        
        <div id="character-select">
            <h1>CHAMPION SELECT</h1>
            <p>Choose your Legend</p>
            <div id="class-grid">
                <!-- Populated by JS -->
            </div>
            <button id="start-btn" disabled>ENTER ARENA</button>
        </div>

        <div id="game-over-screen" style="display: none;">
            <h1>YOU DIED</h1>
            <div id="game-over-stats">Score: 0</div>
            <button id="restart-btn">RESPAWN</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
