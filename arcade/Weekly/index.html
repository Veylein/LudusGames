<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remembrance: God Simulator</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- MAIN MENU OVERLAY -->
    <div id="main-menu">
        <div class="menu-content">
            <h1 class="title">REMEMBRANCE</h1>
            <p class="subtitle">Advanced God Simulator</p>
            
            <div class="menu-grid">
                <!-- LEFT: Create New -->
                <div class="menu-panel">
                    <h2><i class="fa-solid fa-earth-americas"></i> Create World</h2>
                    <div class="input-group">
                        <label>World Name</label>
                        <input type="text" id="world-name-input" placeholder="New World" value="Genesis">
                    </div>
                    <div class="input-group">
                        <label>Map Size</label>
                        <select id="world-size-input">
                            <option value="100">Tiny (100x100)</option>
                            <option value="200" selected>Standard (200x200)</option>
                            <option value="300">Large (300x300)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Mode</label>
                        <div class="radio-group">
                            <label class="radio-btn active">
                                <input type="radio" name="mode" value="creative" checked> Creative
                            </label>
                            <label class="radio-btn">
                                <input type="radio" name="mode" value="survival"> Survival
                            </label>
                        </div>
                    </div>
                    <button id="btn-create-world" class="action-btn primary">Create World</button>
                </div>

                <!-- RIGHT: Load World -->
                <div class="menu-panel">
                    <h2><i class="fa-solid fa-floppy-disk"></i> Load World</h2>
                    <div id="save-slot-list">
                        <!-- Slots injected by JS -->
                        <div class="empty-slot">No saved worlds found...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- GAME UI (Hidden by default) -->
    <div id="ui-layer" style="display: none;">
        <div id="top-panel">
            <div id="game-info">
                <h1 id="world-title-display">WORLD NAME</h1>
                <div id="game-stats">
                    <span class="stat-box" id="year-display">Year 1</span>
                    <span class="stat-box" id="pop-display">0 Beings</span>
                    <span class="stat-box" id="vil-display">0 Villages</span>
                </div>
            </div>
            <div class="top-buttons">
                <button id="btn-save" class="icon-btn" title="Save & Exit"><i class="fa-solid fa-save"></i></button>
                <button id="btn-speed" class="icon-btn" title="Toggle Speed"><i class="fa-solid fa-forward"></i></button>
            </div>
        </div>

        <div id="toast-container"></div>
        
        <!-- IMPROVED INSPECTOR -->
        <div id="inspector">
            <div id="inspector-header">
                <span id="inspector-title">Entity</span>
                <i class="fa-solid fa-xmark" id="inspector-close" style="cursor:pointer;"></i>
            </div>
            
            <div class="inspector-tabs">
                <button class="tab-btn active" data-tab="info">Info</button>
                <button class="tab-btn" data-tab="traits">Traits</button>
                <button class="tab-btn" data-tab="thoughts">Mind</button>
            </div>

            <div id="inspector-content">
                <!-- Dynamic Content -->
            </div>
        </div>

        <div id="bottom-toolbar">
            <!-- Navigation/System -->
            <div class="tool-category">
                <button class="tool-btn active" data-tool="cursor" title="Inspect/Select"><i class="fa-solid fa-arrow-pointer"></i><span class="tool-tooltip">Cursor</span></button>
                <button class="tool-btn" data-tool="info" title="World History"><i class="fa-solid fa-book-open"></i><span class="tool-tooltip">History</span></button>
            </div>

            <!-- Terraforming -->
            <div class="tool-category">
                <button class="tool-btn" data-tool="mountains" title="Create Mountains"><i class="fa-solid fa-mountain"></i><span class="tool-tooltip">Mountains</span></button>
                <button class="tool-btn" data-tool="forest" title="Plant Forest"><i class="fa-solid fa-tree"></i><span class="tool-tooltip">Forest</span></button>
                <button class="tool-btn" data-tool="water" title="Create Water"><i class="fa-solid fa-water"></i><span class="tool-tooltip">Water</span></button>
                <button class="tool-btn" data-tool="sand" title="Create Sand"><i class="fa-solid fa-umbrella-beach"></i><span class="tool-tooltip">Sand</span></button>
            </div>
            
            <!-- Life -->
            <div class="tool-category">
                <button class="tool-btn" data-tool="human" title="Spawn Human"><i class="fa-solid fa-person"></i><span class="tool-tooltip">Human</span></button>
                <button class="tool-btn" data-tool="animal" title="Spawn Animal"><i class="fa-solid fa-paw"></i><span class="tool-tooltip">Animal</span></button>
                <button class="tool-btn" data-tool="chicken" title="Spawn Chicken"><i class="fa-solid fa-egg"></i><span class="tool-tooltip">Chicken</span></button>
            </div>

            <!-- Civilization -->
            <div class="tool-category">
                <button class="tool-btn" data-tool="village" title="Found Village" style="color: gold;"><i class="fa-solid fa-crown"></i><span class="tool-tooltip">Start Kingdom</span></button>
                <button class="tool-btn" data-tool="war" title="Inspire War" style="color: #ff4444;"><i class="fa-solid fa-swords"></i><span class="tool-tooltip">Inspire War</span></button>
            </div>

            <!-- Destruction -->
            <div class="tool-category">
                <button class="tool-btn" data-tool="fire" title="Fire" style="color: orange;"><i class="fa-solid fa-fire"></i><span class="tool-tooltip">Fire</span></button>
                <button class="tool-btn" data-tool="tnt" title="Explosion" style="color: red;"><i class="fa-solid fa-bomb"></i><span class="tool-tooltip">TNT</span></button>
                <button class="tool-btn" data-tool="plague" title="Plague" style="color: purple;"><i class="fa-solid fa-biohazard"></i><span class="tool-tooltip">Plague</span></button>
            </div>
        </div>
    </div>
    
    <canvas id="game-canvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
