<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Redline - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
    <style>
        .racing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }
        canvas {
            border: 4px solid #d00;
            box-shadow: 0 0 10px #d00;
            background: #2b7a3a; /* Grass Green default */
            image-rendering: pixelated;
        }
        .ui-panel {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #888;
            padding: 10px;
            width: 100%;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
        }
        .upgrade-shop {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .upgrade-btn {
            background: #333;
            color: #fff;
            border: 2px solid #555;
            padding: 5px;
            font-family: inherit;
            cursor: pointer;
            font-size: 10px;
            text-align: left;
        }
        .upgrade-btn:hover { background: #555; }
        .upgrade-btn span { display: block; color: #ff0; }
        
        .map-select {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .map-btn {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            padding: 5px 10px;
            cursor: pointer;
        }
        .map-btn.active {
            border-color: #d00;
            color: #fff;
            background: #400;
        }

        /* CRT Scanline Effect */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="theme-arcade">
    <div class="game-container">
        <header>
            <a href="../index.html" class="back-link">← ARCADE</a>
            <h1 class="glow-title" style="color:#d00; text-shadow:2px 2px 0 #fff;">RETRO REDLINE</h1>
        </header>

        <main>
            <div class="racing-container">
                <div class="ui-panel">
                    <span>CASH: $<span id="cash-display">0</span></span>
                    <span>LAPS: <span id="laps-display">0/3</span></span>
                    <span>TIME: <span id="time-display">0.0</span>s</span>
                </div>

                <div class="map-select">
                    <button class="map-btn active" onclick="game.selectMap(0)">Oval Circuit</button>
                    <button class="map-btn" onclick="game.selectMap(1)">Desert Drift</button>
                    <button class="map-btn" onclick="game.selectMap(2)">City Sprint</button>
                </div>
                
                <div style="position: relative;" class="crt">
                    <canvas id="gameCanvas" width="640" height="480"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2 style="color: #ff0;">READY TO RACE?</h2>
                        <p>ARROW KEYS TO DRIVE</p>
                        <p class="blink">PRESS SPACE TO START</p>
                    </div>
                    
                    <div id="game-over" class="overlay" style="display: none;">
                        <h2 id="race-result">FINISHED!</h2>
                        <p>Time: <span id="final-time">0.0</span>s</p>
                        <p>Winnings: $<span id="winnings">0</span></p>
                        <button id="restart-btn" class="retro-btn">RACE AGAIN</button>
                    </div>
                </div>

                <div class="upgrade-shop">
                    <button class="upgrade-btn" onclick="game.buyUpgrade('speed')">
                        Engine (Speed)
                        <span id="speed-cost">$100</span>
                    </button>
                    <button class="upgrade-btn" onclick="game.buyUpgrade('accel')">
                        Tires (Accel)
                        <span id="accel-cost">$100</span>
                    </button>
                    <button class="upgrade-btn" onclick="game.buyUpgrade('handling')">
                        Suspension (Turn)
                        <span id="handling-cost">$100</span>
                    </button>
                    <button class="upgrade-btn" onclick="game.buyUpgrade('nitro')">
                        Nitro Boost
                        <span id="nitro-cost">$500</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="racing.js"></script>
</body>
</html>
