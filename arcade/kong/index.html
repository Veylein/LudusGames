<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donkey Kong - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
</head>
<body class="theme-arcade">

    <div class="arcade-cabinet">
        <!-- CABINET HEADER / MARQUEE -->
        <div class="cabinet-header">
            <h1 class="cabinet-title">DONKEY KONG</h1>
            <div class="cabinet-chars">
                <span>🦍</span><span>🛢️</span><span>👸</span>
            </div>
        </div>

        <!-- SCREEN BEZEL -->
        <div class="crt-bezel">
            <div class="game-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="hud" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; color: cyan;">
                    <span>SCORE: <span id="game-score">0</span></span>
                    <span>HIGH: <span id="high-score">0</span></span>
                </div>
                
                <div class="canvas-wrapper" style="position: relative;">
                    <canvas id="gameCanvas" width="500" height="500" style="max-width: 100%; height: auto; border: 4px solid var(--accent-color); background: #000;"></canvas>
                    
                    <div id="start-screen" class="overlay" onclick="startGame()">
                        <h2>DONKEY KONG</h2>
                        <p>CLICK TO START</p>
                        <p class="blink">INSERT COIN</p>
                    </div>
                    
                    <div id="gameOver" class="overlay" style="display: none;">
                        <h2 style="color: #ff0055;">GAME OVER</h2>
                        <p>SCORE: <span id="final-score">0</span></p>
                        <button class="retro-btn" onclick="startGame()">TRY AGAIN</button>
                    </div>
                </div>

                <div class="controls-info" style="margin-top: 10px; font-size: 10px; color: #aaa;">
                    <p>Arrows to Move | Space to Jump | <a href="../index.html" style="color: #fff;">EXIT</a></p>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <div class="joystick-area">
                <div class="joystick-base">
                    <div class="joystick-stick">
                        <div class="joystick-ball" style="background: orange;"></div>
                    </div>
                </div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">MOVE</div>
            </div>
            
            <div class="buttons-area">
                <div class="arcade-button btn-blue" style="width: 50px; height: 50px;" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}))"></div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">JUMP</div>
            </div>
        </div>

    </div>

    <!-- Hidden Mobile Controls Bridge -->
    <div class="mobile-controls" style="display:none;">
         <button id="left-btn">◀</button>
        <button id="right-btn">▶</button>
         <button id="jump-btn">JUMP</button>
    </div>

    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <script src="kong.js"></script>
</body>
</html>
