<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galaga - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
    <style>
        /* Specific overrides for Galaga */
        .game-container {
            max-width: 600px; /* Slightly narrower for vertical shooter */
        }
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .canvas-wrapper {
            position: relative;
            margin: 0 auto;
        }
        canvas {
            border: 4px solid var(--accent-color);
            background-color: #000;
            image-rendering: pixelated;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body class="theme-arcade">

    <div class="arcade-cabinet">
        <!-- CABINET HEADER / MARQUEE -->
        <div class="cabinet-header">
            <h1 class="cabinet-title">GALAGA</h1>
            <div class="cabinet-chars">
                <span>🚀</span><span>🐝</span><span>🦋</span><span>🦗</span>
            </div>
        </div>

        <!-- SCREEN BEZEL -->
        <div class="crt-bezel">
            <div class="game-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="hud" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; color: yellow;">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>HIGH: <span id="high-score">0</span></span>
                </div>
                
                <div class="canvas-wrapper" style="position: relative;">
                    <canvas id="gameCanvas" width="480" height="640" style="max-width: 100%; height: auto; border: 4px solid var(--accent-color); background: #000;"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>GALAGA</h2>
                        <p>CLICK / TAP TO START</p>
                        <p class="blink">INSERT COIN</p>
                    </div>
                    
                    <div id="game-over-screen" class="overlay" style="display: none;">
                        <h2 style="color: #ff0055;">GAME OVER</h2>
                        <p>SCORE: <span id="final-score">0</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>

                <div class="controls" style="margin-top: 10px; display: flex; gap: 10px; align-items: center;">
                     <button id="pause-btn" class="retro-btn" style="padding: 5px 10px; font-size: 10px;">PAUSE</button>
                     <select id="difficulty-select" style="background: #000; color: #fff; border: 1px solid #fff; font-family: inherit;">
                        <option value="easy">Cadet</option>
                        <option value="normal" selected>Commander</option>
                        <option value="hard">Admiral</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <div class="joystick-area">
                <div class="joystick-base">
                    <div class="joystick-stick">
                        <div class="joystick-ball" style="background: red;"></div>
                    </div>
                </div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">MOVE</div>
            </div>
            
            <div class="buttons-area">
                <div class="arcade-button btn-red" style="width: 50px; height: 50px;" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}))"></div>
            </div>
        </div>
        
        <div class="controls-info" style="margin-top: 10px; font-size: 10px; color: #aaa;">
            <p>LEFT/RIGHT: Move | SPACE: Fire | <a href="../index.html" style="color: #fff;">EXIT</a></p>
        </div>

    </div>

    <!-- Hidden Mobile Controls Bridge -->
    <div class="mobile-controls" style="display:none;">
        <button id="left-btn">◀</button>
        <button id="right-btn">▶</button>
         <button id="fire-btn">FIRE</button>
    </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Common Scripts -->
    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <!-- Game Script -->
    <script src="galaga.js"></script>
</body>
</html>
