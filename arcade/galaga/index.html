<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galaga - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
    <style>
        /* Specific overrides for Galaga */
        .game-container {
            max-width: 600px; /* Slightly narrower for vertical shooter */
        }
        canvas {
            border: 4px solid var(--accent-color);
            background-color: #000;
            image-rendering: pixelated;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body class="theme-arcade">

    <div class="game-container">
        <header>
            <a href="../index.html" class="back-link">← Back to Arcade</a>
            <h1 class="glow-title" data-text="GALAGA">GALAGA</h1>
        </header>

        <main>
            <div class="game-area">
                <div class="hud">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>HIGH: <span id="high-score">0</span></span>
                </div>
                
                <div class="canvas-wrapper">
                    <canvas id="gameCanvas" width="480" height="640"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>GALAGA</h2>
                        <p>PRESS SPACE/TAP TO START</p>
                        <p class="blink">INSERT COIN</p>
                    </div>
                    
                    <div id="game-over-screen" class="overlay" style="display: none;">
                        <h2 style="color: #ff0055;">GAME OVER</h2>
                        <p>SCORE: <span id="final-score">0</span></p>
                        <p>LEVEL: <span id="final-level">1</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>

                <div class="controls">
                    <div class="difficulty-control">
                        <span>DIFFICULTY: </span>
                        <select id="difficulty-select">
                            <option value="easy">Cadet</option>
                            <option value="normal" selected>Commander</option>
                            <option value="hard">Admiral</option>
                        </select>
                    </div>
                    <button id="pause-btn" class="retro-btn">PAUSE</button>
                </div>
                
                <div class="mobile-controls">
                    <div class="row">
                        <button id="left-btn">◀</button>
                        <button id="fire-btn" class="round-btn">FIRE</button>
                        <button id="right-btn">▶</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Common Scripts -->
    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <!-- Game Script -->
    <script src="galaga.js"></script>
</body>
</html>
