<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q*bert - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
    <style>
        .qbert-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #gameCanvas {
            border: 4px solid #fff;
            background: #000;
        }
    </style>
</head>
<body class="theme-arcade">

    <div class="arcade-cabinet">
        <!-- CABINET HEADER / MARQUEE -->
        <div class="cabinet-header">
            <h1 class="cabinet-title">Q*BERT</h1>
            <div class="cabinet-chars">
                <span>🟧</span><span>🗣️</span><span>🌀</span>
            </div>
        </div>

        <!-- SCREEN BEZEL -->
        <div class="crt-bezel">
            <div class="game-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="hud" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; color: orange;">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>LIVES: <span id="lives">3</span></span>
                </div>
                
                <div class="canvas-wrapper" style="position: relative;">
                    <canvas id="gameCanvas" width="400" height="500" style="max-width: 100%; height: auto; border: 4px solid var(--accent-color); background: #000;"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>Q*BERT</h2>
                        <p>PRESS SPACE TO START</p>
                         <p class="blink">INSERT COIN</p>
                    </div>
                </div>

                <div class="controls-info" style="margin-top: 10px; font-size: 10px; color: #aaa;">
                    <p>Arrow Keys (Up/Left = Top-Left) | <a href="../index.html" style="color: #fff;">EXIT</a></p>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <div class="joystick-area">
                <div class="joystick-base">
                    <div class="joystick-stick">
                        <div class="joystick-ball" style="background: orange;"></div>
                    </div>
                </div>
                <!-- Rotated label for diagonal -->
                <div style="margin-top: 10px; font-size: 10px; color: #888;">DIAGONAL</div>
            </div>
            
            <div class="buttons-area">
                <div class="arcade-button btn-yellow" style="width: 50px; height: 50px;" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}))"></div>
                 <div style="margin-top: 10px; font-size: 10px; color: #888;">START</div>
            </div>
        </div>

    </div>

    <!-- Hidden Mobile Controls Bridge -->
    <div class="mobile-controls" style="display:none;">
         <div class="row">
                     <button id="upleft-btn">◤</button>
                     <button id="upright-btn">◥</button>
                </div>
                <div class="row">
                     <button id="downleft-btn">◣</button>
                     <button id="downright-btn">◢</button>
                </div>
    </div>

    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <script src="qbert.js"></script>
</body>
</html>
