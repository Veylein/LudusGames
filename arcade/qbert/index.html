<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q*bert - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
    <style>
        .qbert-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #gameCanvas {
            border: 4px solid #fff;
            background: #000;
        }
    </style>
</head>
<body class="theme-arcade">

    <div class="game-container">
        <header>
            <a href="../index.html" class="back-link">← Back to Arcade</a>
            <h1 class="glow-title" data-text="Q*BERT">Q*BERT</h1>
        </header>

        <main>
            <div class="qbert-container">
                <div class="hud">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>LIVES: <span id="lives">3</span></span>
                </div>
                
                <div class="canvas-wrapper">
                    <canvas id="gameCanvas" width="400" height="500"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>Q*BERT</h2>
                        <p>PRESS SPACE TO START</p>
                    </div>
                </div>
                
                 <div class="controls-info">
                    <p>DIAGONALS (7,9,1,3 or Q,E,Z,C)</p> <!-- Simplified to arrows often -->
                    <p>Use ARROW KEYS (Up/Left = TopLeft, etc)</p>
                </div>
            </div>
             <div class="mobile-controls">
                 <!-- Diagonal pad needed? Or just arrows -->
                <div class="row">
                     <button id="upleft-btn">◤</button>
                     <button id="upright-btn">◥</button>
                </div>
                <div class="row">
                     <button id="downleft-btn">◣</button>
                     <button id="downright-btn">◢</button>
                </div>
            </div>
        </main>
    </div>

    <script src="qbert.js"></script>
</body>
</html>
