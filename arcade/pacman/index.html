<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacman - Ludus Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css"> <!-- Added Global Arcade CSS -->
    <link rel="stylesheet" href="pacman.css">
</head>
<body class="theme-arcade">

    <div class="arcade-cabinet">
        <!-- CABINET HEADER -->
        <div class="cabinet-header">
            <h1 class="cabinet-title">PACMAN</h1>
            <div class="cabinet-chars">
                <span>🍒</span><span>👻</span><span>🍓</span><span>👻</span>
            </div>
            <!-- Retro Toggle inside cabinet -->
            <div class="theme-switch-wrapper" style="position: absolute; right: 10px; top: 10px; transform: scale(0.6);">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
            </div>
        </div>

        <!-- SCREEN BEZEL -->
        <div class="crt-bezel">
            <div class="game-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="status-bar" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: yellow;">
                    <span>SCORE: <b id="score">0</b></span>
                    <span>HIGH: <b id="high-score">0</b></span>
                </div>

                <div class="canvas-wrapper" style="position: relative;">
                    <canvas id="gameCanvas" width="440" height="520"></canvas>
                    <div id="start-screen" class="overlay"> <!-- Added overlay class -->
                        <h2>CLICK / TAP TO START</h2>
                        <p>Use Arrow Keys to move</p>
                    </div>
                    <div id="game-over-screen" class="overlay" style="display: none;"> <!-- Added overlay class -->
                        <h2 style="color: #ff0055;">GAME OVER</h2>
                        <p>Score: <span id="final-score">0</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>

                <div class="controls" style="margin-top: 10px; display: flex; gap: 10px; align-items: center;">
                    <button id="pause-btn" class="retro-btn" style="padding: 5px 10px; font-size: 10px;">PAUSE</button>
                    <select id="difficulty-select" style="background: #000; color: #fff; border: 1px solid #fff; font-family: inherit;">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Normal</option>
                        <option value="hard">Hard</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <div class="joystick-area">
                <div class="joystick-base">
                    <div class="joystick-stick">
                        <div class="joystick-ball" style="background: yellow;"></div> <!-- Pacman uses yellow ball? -->
                    </div>
                </div>
            </div>
            
            <div class="buttons-area">
                <!-- Pacman has no 'fire' button usually, but maybe for start/restart -->
                <div class="arcade-button btn-blue" style="width: 50px; height: 50px;" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}))"></div> 
            </div>
        </div>
        
        <div class="controls-info" style="margin-top: 10px; font-size: 10px; color: #aaa;">
            <p><a href="../index.html" style="color: #fff; text-decoration: none;">◄ EXIT TO LOBBY</a></p>
        </div>
    </div>

    <!-- Hidden Mobile Controls Bridge -->
    <div class="mobile-controls" style="display:none;">
        <button id="up-btn">▲</button>
        <button id="left-btn">◀</button>
        <button id="down-btn">▼</button>
        <button id="right-btn">▶</button>
    </div>

    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <script src="pacman.js"></script>
</body>
</html>
