<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frogger - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
</head>
<body class="theme-arcade">

    <div class="game-container">
        <header>
            <a href="../index.html" class="back-link">← Back to Arcade</a>
            <h1 class="glow-title" data-text="FROGGER">FROGGER</h1>
        </header>

        <main>
            <div class="game-area">
                <div class="hud">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>HIGH: <span id="high-score">0</span></span>
                </div>
                
                <div class="canvas-wrapper">
                    <canvas id="gameCanvas" width="448" height="480"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>FROGGER</h2>
                        <p>PRESS SPACE/TAP TO START</p>
                    </div>
                    
                    <div id="game-over-screen" class="overlay" style="display: none;">
                        <h2 style="color: #ff0055;">GAME OVER</h2>
                        <p>FINAL SCORE: <span id="final-score">0</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>

                <div class="controls">
                    <div class="difficulty-control">
                        <span>DIFFICULTY: </span>
                        <select id="difficulty-select">
                            <option value="easy">Tadpole</option>
                            <option value="normal" selected>Frog</option>
                            <option value="hard">Toad</option>
                        </select>
                    </div>
                    <button id="pause-btn" class="retro-btn">PAUSE</button>
                    <div class="lives-display">LIVES: <span id="lives">3</span></div>
                </div>
                
                <div class="mobile-controls">
                    <button id="up-btn">▲</button>
                    <div class="row">
                        <button id="left-btn">◀</button>
                        <button id="down-btn">▼</button>
                        <button id="right-btn">▶</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <script src="frogger.js"></script>
</body>
</html>
