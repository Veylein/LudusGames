<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
    <style>
        .tetris-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }
        #gameCanvas {
            border: 4px solid #fff;
            background: #000;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
        }
        .next-piece {
            border: 2px solid #555;
            width: 100px;
            height: 100px;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="theme-arcade">

    <div class="arcade-cabinet">
        <!-- CABINET HEADER -->
        <div class="cabinet-header">
            <h1 class="cabinet-title">TETRIS</h1>
            <div class="cabinet-chars">
                <span>⬜</span><span>🟫</span><span>🟩</span><span>🟦</span><span>🟪</span>
            </div>
        </div>

        <!-- SCREEN BEZEL -->
        <div class="crt-bezel">
            <div class="tetris-container" style="display: flex; gap: 20px; align-items: flex-start;">
                
                <!-- Game Canvas -->
                <div class="game-area" style="position: relative;">
                    <canvas id="gameCanvas" width="240" height="400" style="border: 4px solid #fff; background: #000;"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>TETRIS</h2>
                        <p>PRESS SPACE TO START</p>
                    </div>
                    
                    <div id="game-over-screen" class="overlay" style="display: none;">
                        <h2 style="color: #ff0055;">GAME OVER</h2>
                        <p>SCORE: <span id="final-score">0</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>

                <!-- Side Panel (Next Piece, Score) -->
                <div class="side-panel" style="display: flex; flex-direction: column; gap: 10px; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 10px;">
                    <div class="score-box">
                        <small style="color: yellow;">SCORE</small>
                        <div id="score">0</div>
                    </div>
                    <div class="level-box">
                        <small style="color: cyan;">LEVEL</small>
                        <div id="level">1</div>
                    </div>
                    <div class="lines-box">
                        <small style="color: orange;">LINES</small>
                        <div id="lines">0</div>
                    </div>
                    <div class="next-box">
                        <small style="color: lime;">NEXT</small>
                        <br>
                        <canvas id="nextCanvas" width="80" height="80" style="background:#111; border:2px solid #555; margin-top: 5px;"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <div class="joystick-area">
                <div class="joystick-base">
                    <div class="joystick-stick">
                        <div class="joystick-ball" style="background: red;"></div>
                    </div>
                </div>
            </div>
            
            <div class="buttons-area">
                 <!-- Tetris usually uses just rotate and drop -->
                 <div class="arcade-button btn-blue" style="width: 50px; height: 50px;" title="Rotate" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'ArrowUp'}))"></div> 
                 <div class="arcade-button btn-yellow" style="width: 50px; height: 50px;" title="Hard Drop" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}))"></div>
            </div>
        </div>
        
        <div class="controls-info" style="margin-top: 10px; font-size: 10px; color: #aaa;">
            <p><a href="../index.html" style="color: #fff; text-decoration: none;">◄ EXIT TO LOBBY</a></p>
        </div>
    </div>

    <!-- Hidden Mobile Controls Bridge -->
    <div class="mobile-controls" style="display:none;">
        <button id="rotate-btn">↻</button>
        <button id="left-btn">◀</button>
        <button id="down-btn">▼</button>
        <button id="right-btn">▶</button>
        <button id="drop-btn">DROP</button>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
