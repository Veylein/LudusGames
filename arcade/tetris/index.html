<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
    <style>
        .tetris-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }
        #gameCanvas {
            border: 4px solid #fff;
            background: #000;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
        }
        .next-piece {
            border: 2px solid #555;
            width: 100px;
            height: 100px;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="theme-arcade">

    <div class="game-container">
        <header>
            <a href="../index.html" class="back-link">← Back to Arcade</a>
            <h1 class="glow-title" data-text="TETRIS">TETRIS</h1>
        </header>

        <main>
            <div class="tetris-container">
                <div class="game-area">
                    <canvas id="gameCanvas" width="240" height="400"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>TETRIS</h2>
                        <p>PRESS SPACE TO START</p>
                    </div>
                    
                    <div id="game-over-screen" class="overlay" style="display: none;">
                        <h2 style="color: #ff0055;">GAME OVER</h2>
                        <p>SCORE: <span id="final-score">0</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>

                <div class="side-panel">
                    <div class="score-box">
                        <small>SCORE</small>
                        <div id="score">0</div>
                    </div>
                    <div class="level-box">
                        <small>LEVEL</small>
                        <div id="level">1</div>
                    </div>
                    <div class="lines-box">
                        <small>LINES</small>
                        <div id="lines">0</div>
                    </div>
                    <div class="next-box">
                        <small>NEXT</small>
                        <canvas id="nextCanvas" width="80" height="80" style="background:#111; border:2px solid #555;"></canvas>
                    </div>
                </div>
            </div>

            <div class="controls-info">
                <p>ARROWS: Move/Rotate | SPACE: Hard Drop</p>
            </div>
            
            <div class="mobile-controls">
                <button id="rotate-btn">↻</button>
                <div class="row">
                    <button id="left-btn">◀</button>
                    <button id="down-btn">▼</button>
                    <button id="right-btn">▶</button>
                </div>
                <button id="drop-btn" style="width: 100%; margin-top: 5px;">DROP</button>
            </div>
        </main>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
