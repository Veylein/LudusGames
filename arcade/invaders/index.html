<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Invaders - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
</head>
<body class="theme-arcade">

    <div class="arcade-cabinet">
        <!-- CABINET HEADER / MARQUEE -->
        <div class="cabinet-header">
            <h1 class="cabinet-title">SPACE INVADERS</h1>
            <div class="cabinet-chars">
                <span>👾</span><span>🛸</span><span>💥</span>
            </div>
        </div>

        <!-- SCREEN BEZEL -->
        <div class="crt-bezel">
            <div class="game-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="hud" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; color: lime;">
                    <span>SCORE: <span id="game-score">0</span></span>
                    <span>HIGH: <span id="high-score">0</span></span>
                </div>
                
                <div class="canvas-wrapper" style="position: relative;">
                    <canvas id="gameCanvas" width="600" height="400" style="max-width: 100%; height: auto; border: 4px solid var(--accent-color); background: #000;"></canvas>
                    
                    <div id="start-screen" class="overlay" onclick="startGame()">
                         <h2>SPACE INVADERS</h2>
                        <p>CLICK TO START</p>
                        <p class="blink">INSERT COIN</p>
                    </div>
                    
                    <div id="gameOver" class="overlay" style="display: none;">
                        <h2 style="color: #ff0055;">GAME OVER</h2>
                        <p>SCORE: <span id="final-score">0</span></p>
                        <button class="retro-btn" onclick="startGame()">TRY AGAIN</button>
                    </div>
                </div>

                <div class="controls-info" style="margin-top: 10px; font-size: 10px; color: #aaa;">
                    <p>Left/Right to Move | Space to Fire | <a href="../index.html" style="color: #fff;">EXIT</a></p>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <div class="joystick-area">
                <div class="joystick-base">
                    <div class="joystick-stick">
                        <div class="joystick-ball" style="background: red;"></div>
                    </div>
                </div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">MOVE</div>
            </div>
            
            <div class="buttons-area">
                <div class="arcade-button btn-green" style="width: 50px; height: 50px;" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}))"></div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">FIRE</div>
            </div>
        </div>

    </div>
    
     <!-- Hidden Mobile Controls Bridge -->
    <div class="mobile-controls" style="display:none;">
    </div>

    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <script src="invaders.js"></script>
    <script>
        // Start game wrapper if needed
    </script>
</body>
</html>
