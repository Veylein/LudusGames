<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run - Ludus Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="dino.css">
</head>
<body class="theme-arcade">

    <div class="arcade-cabinet">
        <!-- CABINET HEADER / MARQUEE -->
        <div class="cabinet-header">
            <h1 class="cabinet-title">DINO RUN</h1>
            <div class="cabinet-chars">
                <span>🦖</span><span>🌴</span><span>🌋</span>
            </div>
        </div>

        <!-- SCREEN BEZEL -->
        <div class="crt-bezel">
            <div class="game-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="hud" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; color: #fff; font-size: 14px;">
                    <span>SCORE: <span id="score">00000</span></span>
                    <span>HIGH: <span id="high-score">00000</span></span>
                </div>
                
                <div class="canvas-wrapper" style="position: relative;">
                    <canvas id="gameCanvas" width="800" height="400" style="max-width: 100%; height: auto; border: 4px solid var(--accent-color); background: #202124;"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>DINO RUN</h2>
                        <p>CLICK / TAP TO JUMP</p>
                        <p>Avoid Cacti and Pterodactyls</p>
                    </div>
                    
                    <div id="game-over-screen" class="overlay" style="display: none;">
                        <h2 id="game-over-title" style="color: #ff0055;">EXTINCT</h2>
                        <p>Score: <span id="final-score">0</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>

                <div class="controls" style="margin-top: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;">
                    <div class="difficulty-control">
                        <span>PERIOD: </span>
                        <select id="difficulty-select" style="background: black; color: white; border: 1px solid white;">
                            <option value="triassic">Triassic (Easy)</option>
                            <option value="jurassic" selected>Jurassic (Normal)</option>
                            <option value="cretaceous">Cretaceous (Hard)</option>
                        </select>
                    </div>
                     <button id="pause-btn" class="retro-btn" style="padding: 5px 10px; font-size: 10px;">PAUSE</button>
                    <div class="theme-switch-wrapper" style="display: flex; align-items: center; gap: 5px; font-size: 10px; color: #aaa;">
                         <input type="checkbox" id="checkbox" class="retro-checkbox" />
                         <label for="checkbox">Retro Mode</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <div class="joystick-area">
                <div class="joystick-base">
                    <div class="joystick-stick">
                        <div class="joystick-ball" style="background: orange;"></div>
                    </div>
                </div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">DUCK (DOWN)</div>
            </div>
            
            <div class="buttons-area">
                <div class="arcade-button btn-green" style="width: 50px; height: 50px;" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}))"></div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">JUMP</div>
            </div>
        </div>
        
         <div class="controls-info" style="margin-top: 10px; font-size: 10px; color: #aaa;">
            <p>SPACE/UP: Jump | DOWN: Duck | <a href="../index.html" style="color: #fff;">EXIT</a></p>
        </div>

    </div>

    <!-- Hidden Mobile Controls Bridge -->
    <div class="mobile-controls" style="display:none;">
         <button id="jump-btn">JUMP</button>
         <button id="duck-btn">DUCK</button>
    </div>

    <script src="dino.js"></script>
</body>
</html>
