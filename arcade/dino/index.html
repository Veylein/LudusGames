<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run - Ludus Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="dino.css">
</head>
<body class="theme-arcade">

    <div class="game-container">
        <header>
            <a href="../index.html" class="back-link">← Back to Arcade</a>
            <h1 class="glow-title" data-text="DINO RUN">DINO RUN</h1>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
                <em>Retro Mode</em>
            </div>
        </header>

        <main>
            <div class="game-area">
                <div class="status-bar">
                    <span>SCORE: <b id="score">00000</b></span>
                    <span>HIGH: <b id="high-score">00000</b></span>
                </div>

                <div class="canvas-wrapper">
                    <canvas id="gameCanvas" width="800" height="400"></canvas>
                    <div id="start-screen">
                        <h2>PRESS SPACE TO JUMP</h2>
                        <p>Avoid Cacti and Pterodactyls</p>
                    </div>
                    <div id="game-over-screen" style="display: none;">
                        <h2 id="game-over-title" style="color: #ff0055;">EXTINCT</h2>
                        <p>Score: <span id="final-score">0</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>

                <div class="controls">
                    <div class="difficulty-control">
                        <span>PERIOD: </span>
                        <select id="difficulty-select">
                            <option value="triassic">Triassic (Easy)</option>
                            <option value="jurassic" selected>Jurassic (Normal)</option>
                            <option value="cretaceous">Cretaceous (Hard)</option>
                        </select>
                    </div>
                    <button id="pause-btn" class="retro-btn">PAUSE</button>
                </div>
                
                <div class="mobile-controls">
                    <button id="jump-btn" class="wide-btn">JUMP / START</button>
                    <button id="duck-btn" class="wide-btn">DUCK</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <script src="dino.js"></script>
</body>
</html>
