<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asteroids - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
    <style>
        .asteroids-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #gameCanvas {
            border: 4px solid #fff;
            background: #000;
        }
    </style>
</head>
<body class="theme-arcade">

    <div class="arcade-cabinet">
        <!-- CABINET HEADER / MARQUEE -->
        <div class="cabinet-header">
            <h1 class="cabinet-title">ASTEROIDS</h1>
            <div class="cabinet-chars">
                <span>👾</span><span>🚀</span><span>☄️</span><span>✨</span>
            </div>
        </div>

        <!-- SCREEN BEZEL -->
        <div class="crt-bezel">
            <div class="game-container">
                <div class="hud" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; color: #fff;">
                    <span>SCORE: <span id="score">0</span></span>
                    <span>LIVES: <span id="lives">3</span></span>
                </div>
                
                <div class="canvas-wrapper" style="position: relative;">
                    <canvas id="gameCanvas" width="600" height="400"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>ASTEROIDS</h2>
                        <p>PRESS SPACE TO START</p>
                    </div>
                    
                    <div id="game-over-screen" class="overlay" style="display: none;">
                        <h2 style="color: #ff0055;">GAME OVER</h2>
                        <p>SCORE: <span id="final-score">0</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL (Visual + Functional Mobile Fallback) -->
        <div class="control-panel">
            <div class="joystick-area">
                <div class="joystick-base">
                    <div class="joystick-stick">
                        <div class="joystick-ball"></div>
                    </div>
                </div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">MOVE</div>
            </div>
            
            <div class="buttons-area">
                <div class="arcade-button btn-red" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}))"></div>
                <div class="arcade-button btn-blue"></div>
            </div>
        </div>
        
        <div class="controls-info" style="margin-top: 10px; font-size: 10px; color: #aaa;">
            <p>KB: ARROWS + SPACE | <a href="../index.html" style="color: #fff;">EXIT</a></p>
        </div>

    </div>

    <!-- Hidden Mobile Controls Bridge for existing JS if needed, 
         though we might want to map the visual buttons to events -->
    <div class="mobile-controls" style="display:none;">
        <button id="up-btn">▲</button>
        <button id="left-btn">◀</button>
        <button id="right-btn">▶</button>
        <button id="fire-btn">●</button>
    </div>

    <script src="asteroids.js"></script>
</body>
</html>
