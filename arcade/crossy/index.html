<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossy Road - Ludus Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="crossy.css">
</head>
<body class="theme-arcade">

    <div class="game-container">
        <header>
            <a href="../index.html" class="back-link">← Back to Arcade</a>
            <h1 class="glow-title" data-text="CROSSY">CROSSY</h1>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
                <em>Retro Mode</em>
            </div>
        </header>

        <main>
            <div class="game-area">
                <div class="status-bar">
                    <span>SCORE: <b id="score">0</b></span>
                    <span>HIGH SCORE: <b id="high-score">0</b></span>
                </div>

                <div class="canvas-wrapper">
                    <canvas id="gameCanvas" width="600" height="500"></canvas>
                    <div id="start-screen">
                        <h2>PRESS SPACE TO START</h2>
                        <p>Use Arrow Keys to Move</p>
                    </div>
                    <div id="game-over-screen" style="display: none;">
                        <h2 style="color: #ff0055;">SPLAT!</h2>
                        <p>Score: <span id="final-score">0</span></p>
                        <button id="restart-btn" class="retro-btn">TRY AGAIN</button>
                    </div>
                </div>

                <div class="controls">
                    <div class="difficulty-control">
                        <span>TRAFFIC: </span>
                        <select id="difficulty-select">
                            <option value="easy">Sunday Driver (Slow)</option>
                            <option value="medium" selected>Rush Hour (Normal)</option>
                            <option value="hard">Highway (Fast)</option>
                        </select>
                    </div>
                    <button id="pause-btn" class="retro-btn">PAUSE</button>
                </div>
                
                <div class="mobile-controls">
                    <button id="up-btn">▲</button>
                    <div class="row">
                        <button id="left-btn">◀</button>
                        <button id="down-btn">▼</button>
                        <button id="right-btn">▶</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../ui.js"></script>
    <script src="../../effects.js"></script>
    <script src="crossy.js"></script>
</body>
</html>
