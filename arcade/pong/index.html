<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pong - Ludus Arcade</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../themes.css">
    <link rel="stylesheet" href="../arcade.css">
    <style>
        .pong-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #gameCanvas {
            border: 4px solid #fff;
            background: #000;
        }
    </style>
</head>
<body class="theme-arcade">

    <div class="arcade-cabinet">
        <!-- CABINET HEADER / MARQUEE -->
        <div class="cabinet-header">
            <h1 class="cabinet-title">PONG</h1>
            <div class="cabinet-chars">
                <span>⬜</span><span>🏓</span><span>⬜</span>
            </div>
        </div>

        <!-- SCREEN BEZEL -->
        <div class="crt-bezel">
            <div class="game-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div class="hud" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; color: #fff; font-size: 16px;">
                    <span>PLAYER: <span id="player-score">0</span></span>
                    <span>CPU: <span id="cpu-score">0</span></span>
                </div>
                
                <div class="canvas-wrapper" style="position: relative;">
                    <canvas id="gameCanvas" width="600" height="400" style="max-width: 100%; height: auto; border: 4px solid var(--accent-color); background: #000;"></canvas>
                    
                    <div id="start-screen" class="overlay">
                        <h2>PONG</h2>
                        <p>PRESS SPACE/TAP TO START</p>
                        <p class="blink">INSERT COIN</p>
                    </div>
                </div>

                <div class="controls-info" style="margin-top: 10px; font-size: 10px; color: #aaa;">
                    <p>Up/Down or W/S to Move | <a href="../index.html" style="color: #fff;">EXIT</a></p>
                </div>
            </div>
        </div>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <div class="joystick-area">
                <div class="joystick-base">
                    <div class="joystick-stick">
                        <div class="joystick-ball" style="background: white;"></div>
                    </div>
                </div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">MOVE</div>
            </div>
            
            <div class="buttons-area">
                <div class="arcade-button btn-white" style="width: 50px; height: 50px;" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'code': 'Space'}))"></div>
                <div style="margin-top: 10px; font-size: 10px; color: #888;">SERVE</div>
            </div>
        </div>

    </div>

    <!-- Hidden Mobile Controls Bridge -->
    <div class="mobile-controls" style="display:none;">
        <button id="up-btn">▲</button>
        <button id="down-btn">▼</button>
    </div>

    <script src="pong.js"></script>
</body>
</html>
